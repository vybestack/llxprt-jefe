name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_tui_smoke:
        description: Run optional tmux-backed TUI smoke scenario
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format (rustfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check

  lint:
    name: Lint (clippy)
    runs-on: ubuntu-latest
    env:
      CLIPPY_CONF_DIR: .github/clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy (warnings as errors)
        run: rustup run stable cargo clippy --workspace --all-targets --all-features -- -D warnings

  clippy_allow_policy:
    name: Clippy allow policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Block untracked clippy allow attributes
        run: scripts/check-clippy-allows.sh

  source_file_size:
    name: Source file length checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce source file length policy
        run: scripts/check-source-file-size.sh

  complexity:
    name: Complexity checks
    runs-on: ubuntu-latest
    env:
      CLIPPY_CONF_DIR: .github/clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Enforce complexity limits
        run: |
          rustup run stable cargo clippy --workspace --all-targets --all-features -- \
            -A clippy::all \
            -A clippy::pedantic \
            -A clippy::nursery \
            -D clippy::cognitive_complexity \
            -D clippy::too_many_lines \
            -D clippy::too_many_arguments \
            -D clippy::type_complexity \
            -D clippy::struct_excessive_bools

  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Enforce line coverage threshold
        run: |
          RUSTC_BIN="$(rustup which --toolchain stable rustc)"
          TOOLCHAIN_DIR="$(dirname "$(dirname "$RUSTC_BIN")")"
          HOST_TRIPLE="$(rustup run stable rustc -vV | sed -n 's/^host: //p')"
          LLVM_COV="$TOOLCHAIN_DIR/lib/rustlib/$HOST_TRIPLE/bin/llvm-cov" \
          LLVM_PROFDATA="$TOOLCHAIN_DIR/lib/rustlib/$HOST_TRIPLE/bin/llvm-profdata" \
          rustup run stable cargo llvm-cov \
            --workspace \
            --all-features \
            --summary-only \
            --ignore-filename-regex '(/vendor/|/tmp/|/rustc-)' \
            --fail-under-lines 30

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fmt, lint, clippy_allow_policy, source_file_size, complexity, coverage]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Build workspace
        run: cargo build --workspace --all-features --locked

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --all-features --locked

  windows_native:
    name: Native Windows (MSVC + psmux)
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      CLIPPY_CONF_DIR: .github/clippy
      JEFE_REQUIRE_PSMUX: "1"
      RUST_BACKTRACE: full
      RUST_TEST_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: x86_64-pc-windows-msvc
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          shared-key: windows-msvc
      - name: Initialize Windows diagnostics
        shell: pwsh
        run: New-Item -ItemType Directory -Force target/windows-ci | Out-Null
      - name: Install pinned psmux 3.3.6
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = 'https://github.com/psmux/psmux/releases/download/v3.3.6/psmux-v3.3.6-windows-x64.zip'
          $expected = 'a56a890ea0829567818b9a368f16dcbd39c087f27328573df17c10dd39618947'
          $archive = Join-Path $env:RUNNER_TEMP 'psmux-v3.3.6-windows-x64.zip'
          $install = Join-Path $env:RUNNER_TOOL_CACHE 'psmux\3.3.6\x64'
          Invoke-WebRequest -Uri $url -OutFile $archive
          $actual = (Get-FileHash -Path $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "psmux archive checksum mismatch: expected $expected, got $actual"
          }
          New-Item -ItemType Directory -Force $install | Out-Null
          Expand-Archive -Path $archive -DestinationPath $install -Force
          $executable = Get-ChildItem -Path $install -Filter psmux.exe -Recurse |
            Select-Object -First 1
          if ($null -eq $executable) {
            throw "psmux.exe was not present in the verified archive"
          }
          $executable.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Append
          "JEFE_PSMUX_BIN=$($executable.FullName)" |
            Out-File -FilePath $env:GITHUB_ENV -Append
      - name: Verify psmux version
        shell: pwsh
        run: |
          $version = & $env:JEFE_PSMUX_BIN -V 2>&1
          $status = $LASTEXITCODE
          $version | Tee-Object -FilePath target/windows-ci/psmux-version.txt
          if ($status -ne 0) {
            exit $status
          }
          if ($version -notmatch '3\.3\.6') {
            throw "expected qualified psmux 3.3.6, got: $version"
          }
      - name: Check formatting
        shell: pwsh
        run: |
          cargo fmt --all --check 2>&1 |
            Tee-Object -FilePath target/windows-ci/cargo-fmt.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Run strict Clippy
        shell: pwsh
        run: |
          cargo clippy --workspace --all-targets --all-features -- -D warnings 2>&1 |
            Tee-Object -FilePath target/windows-ci/cargo-clippy.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Build locked all-feature workspace
        shell: pwsh
        run: |
          cargo build --workspace --all-features --locked 2>&1 |
            Tee-Object -FilePath target/windows-ci/cargo-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Test locked all-feature workspace
        shell: pwsh
        run: |
          cargo test --workspace --all-features --locked 2>&1 |
            Tee-Object -FilePath target/windows-ci/cargo-test.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Run real psmux command-surface smoke suite
        shell: pwsh
        run: |
          cargo test --features psmux-smoke --test psmux_smoke -- --nocapture 2>&1 |
            Tee-Object -FilePath target/windows-ci/psmux-smoke.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Run deterministic startup and quit TUI scenario
        shell: pwsh
        run: |
          $config = Join-Path $env:RUNNER_TEMP 'jefe windows ci config'
          $working = Join-Path $env:RUNNER_TEMP 'jefe windows ci working directory'
          $artifacts = Join-Path $env:GITHUB_WORKSPACE 'target\tmux-harness\windows-startup'
          New-Item -ItemType Directory -Force $config, $working, $artifacts | Out-Null
          $harness = Join-Path $env:GITHUB_WORKSPACE 'target\debug\jefe-tmux-harness.exe'
          $jefe = Join-Path $env:GITHUB_WORKSPACE 'target\debug\jefe.exe'
          & $harness `
            --scenario dev-docs/tmux-scenarios/startup-quit.json `
            --jefe-bin $jefe `
            --config $config `
            --working-dir $working `
            --session "jefe-ci-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT" `
            --out-dir $artifacts 2>&1 |
            Tee-Object -FilePath target/windows-ci/tui-startup.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Record remaining owned psmux sessions
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          $remaining = 'target/windows-ci/remaining-sessions.txt'
          'No harness namespace was recorded.' | Out-File $remaining
          $details = 'target/tmux-harness/windows-startup/multiplexer.txt'
          if (Test-Path $details) {
            $match = Select-String -Path $details -Pattern '^namespace: (.+)$'
            if ($null -ne $match) {
              $namespace = $match.Matches[0].Groups[1].Value
              $output = & $env:JEFE_PSMUX_BIN -f NUL -L $namespace list-sessions 2>&1
              $status = $LASTEXITCODE
              @("namespace: $namespace", "status: $status") + $output |
                Out-File $remaining
            }
          }
          exit 0
      - name: Upload native Windows diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-windows-psmux-artifacts
          path: |
            target/windows-ci
            target/psmux-smoke
            target/tmux-harness
          if-no-files-found: warn

  tui_smoke:
    name: Optional TUI smoke (tmux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_tui_smoke == 'true' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install tmux
        shell: bash
        run: |
          set -euo pipefail
          if ! { sudo apt-get update && sudo apt-get install -y tmux; }; then
            echo "WARNING: tmux installation failed; smoke scenario will be skipped"
          fi
      - name: Run startup TUI smoke scenario
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v tmux >/dev/null 2>&1; then
            echo "tmux unavailable after install attempt; skipping optional TUI smoke"
            exit 0
          fi
          cargo build --locked --all-features --bin jefe --bin jefe-tmux-harness
          config_dir="$(mktemp -d)"
          mkdir -p target/tmux-harness/ci-startup
          target/debug/jefe-tmux-harness \
            --scenario dev-docs/tmux-scenarios/startup-quit.json \
            --jefe-bin target/debug/jefe \
            --config "$config_dir" \
            --out-dir target/tmux-harness/ci-startup
      - name: Upload TUI smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tui-smoke-artifacts
          path: target/tmux-harness
          if-no-files-found: ignore
