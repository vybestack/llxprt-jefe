name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format (rustfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check

  lint:
    name: Lint (clippy)
    runs-on: ubuntu-latest
    env:
      CLIPPY_CONF_DIR: .github/clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy (warnings as errors)
        run: rustup run stable cargo clippy --workspace --all-targets --all-features -- -D warnings

  source_file_size:
    name: Source file length checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce source file length policy
        shell: bash
        run: |
          set -euo pipefail

          hard_limit=1000
          warning_limit=750

          errors=0
          warnings=0
          found=0

          while IFS= read -r file; do
            found=1
            lines=$(wc -l < "$file")
            if [ "$lines" -gt "$hard_limit" ]; then
              echo "ERROR: $file has $lines lines (max $hard_limit)"
              errors=$((errors + 1))
            elif [ "$lines" -gt "$warning_limit" ]; then
              echo "WARNING: $file has $lines lines (recommended max $warning_limit)"
              warnings=$((warnings + 1))
            fi
          done < <(
            find src tests -type f -name '*.rs' \
              -not -path 'src/ui/components/*' \
              -not -path 'src/ui/modals/*' \
              -not -path 'src/ui/screens/*' \
              -not -path 'src/main.rs' \
              -not -path 'src/state/mod.rs' \
              -not -path 'src/app_input.rs' \
              | sort
          )

          if [ "$found" -eq 0 ]; then
            echo "No Rust source files found under src/ or tests/."
            exit 0
          fi

          if [ "$warnings" -gt 0 ]; then
            echo "Emitted $warnings file length warning(s)."
          fi

          if [ "$errors" -gt 0 ]; then
            echo "Found $errors file(s) exceeding the hard limit."
            exit 1
          fi

  complexity:
    name: Complexity checks
    runs-on: ubuntu-latest
    env:
      CLIPPY_CONF_DIR: .github/clippy
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Enforce complexity limits
        run: |
          rustup run stable cargo clippy --workspace --all-targets --all-features -- \
            -A clippy::all \
            -A clippy::pedantic \
            -A clippy::nursery \
            -D clippy::cognitive_complexity \
            -D clippy::too_many_lines \
            -D clippy::too_many_arguments \
            -D clippy::type_complexity \
            -D clippy::struct_excessive_bools

  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Enforce line coverage threshold
        run: |
          RUSTC_BIN="$(rustup which --toolchain stable rustc)"
          TOOLCHAIN_DIR="$(dirname "$(dirname "$RUSTC_BIN")")"
          HOST_TRIPLE="$(rustup run stable rustc -vV | sed -n 's/^host: //p')"
          LLVM_COV="$TOOLCHAIN_DIR/lib/rustlib/$HOST_TRIPLE/bin/llvm-cov" \
          LLVM_PROFDATA="$TOOLCHAIN_DIR/lib/rustlib/$HOST_TRIPLE/bin/llvm-profdata" \
          rustup run stable cargo llvm-cov \
            --workspace \
            --all-features \
            --summary-only \
            --ignore-filename-regex '(/vendor/|/tmp/|/rustc-)' \
            --fail-under-lines 30

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fmt, lint, source_file_size, complexity, coverage]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Build workspace
        run: cargo build --workspace --all-features --locked

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --all-features --locked
